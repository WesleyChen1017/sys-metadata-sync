name: System-Auto-Sync
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: sys-core-v1
  cancel-in-progress: true

jobs:
  core-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 
          
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - run: pip install requests python-dotenv
      
      - name: Initialize
        env:
          K1: ${{ secrets.K1 }}
          K2: ${{ secrets.K2 }}
          K3: sys_cache_v1.dat
          K4: ${{ secrets.K4 }}
          K5: ${{ secrets.K5 }}
          K6: ${{ secrets.K6 }}
          K7: ${{ secrets.K7 }}
          K8: ${{ secrets.K8 }}
          M1: ${{ secrets.M1 }}
          PYTHONUNBUFFERED: 1
        run: |
          git config --local user.email "core@system.com"
          git config --local user.name "System-Core-Bot"
          python main.py

      - name: Final-Sync-Check
        if: always()
        run: |
          git add sys_cache_v1.dat
          git commit -m "final sync: terminal state [skip ci]" || exit 0
          git push
